<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Integrasi Sumber Daya Ikan</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="css/style.css">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>


    <div class="top-header">

    <div class="header-left">

        <img
            src="image/Logo KKP Round - Warna.png"
            alt="Logo KKP"
            class="header-logo"
        >

        <div>

            <h1>
                KEMENTERIAN KELAUTAN DAN PERIKANAN
            </h1>

            <p>
                Direktorat Pengelolaan Sumber Daya Ikan (Dit.PSDI)
            </p>

        </div>

    </div>

    <div class="header-right">

        <img
            src="image/2026 KKP Grow Stronger_Color (2).png"
            alt="KKP Grow Stronger"
        >

        <img
            src="image/Logo berAKHLAK.png"
            alt="BerAKHLAK"
        >

    </div>

</div>

<div class="navbar">

    <div class="navbar-title">
        Sistem Integrasi Sumber Daya Ikan
    </div>

        <div class="navbar-search">

    <input
        type="text"
        id="searchInput"
        placeholder="Cari pelabuhan..."
    >

    <button id="searchBtn">
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <div id="suggestions"></div>

</div>

</div>

<div class="container">

   <div id="sidebarContent">

    <h2>Layer Data</h2>

    <hr><br>

    <!-- WPPNRI -->
    <details open>

        <summary>WPPNRI</summary>

        <div class="sub-layer">

            <label><input class="wpp-check" type="checkbox" value="571" checked> WPP 571</label>
            <label><input class="wpp-check" type="checkbox" value="572" checked> WPP 572</label>
            <label><input class="wpp-check" type="checkbox" value="573" checked> WPP 573</label>
            <label><input class="wpp-check" type="checkbox" value="711" checked> WPP 711</label>
            <label><input class="wpp-check" type="checkbox" value="712" checked> WPP 712</label>
            <label><input class="wpp-check" type="checkbox" value="713" checked> WPP 713</label>
            <label><input class="wpp-check" type="checkbox" value="714" checked> WPP 714</label>
            <label><input class="wpp-check" type="checkbox" value="715" checked> WPP 715</label>
            <label><input class="wpp-check" type="checkbox" value="716" checked> WPP 716</label>
            <label><input class="wpp-check" type="checkbox" value="717" checked> WPP 717</label>
            <label><input class="wpp-check" type="checkbox" value="718" checked> WPP 718</label>

        </div>

    </details>

    <br>

    <!-- NON PIPP -->
    <details>

        <summary>Non - PIPP</summary>

        <div class="sub-layer">

            <label>
                <input id="non711" type="checkbox">
                Non PIPP 711
            </label>

            <label>
                <input id="non712" type="checkbox">
                Non PIPP 712
            </label>

        </div>

    </details>

    <br>

    <!-- PIPP -->
    <details>

        <summary>PIPP</summary>

        <div class="sub-layer">

            <label>
                <input id="pipp711" type="checkbox">
                PIPP 711
            </label>

            <label>
                <input id="pipp712" type="checkbox">
                PIPP 712
            </label>

        </div>

    </details>

</div>

    <!-- MAP -->
    <div class="content">

    <div id="map"></div>

    <div class="dashboard-charts">

        <div class="chart-card">

            <h3>Produksi Ikan per Titik Pendaratan</h3>

            <select id="wppFilter">
                <option value="all">Semua WPP</option>
                <option value="711">WPP 711</option>
                <option value="712">WPP 712</option>
            </select>

            <canvas id="landingChart"></canvas>

        </div>

        <div class="chart-card">

            <h3>Komposisi Alat Penangkapan Ikan</h3>

            <select id="apiFilter">
                <option value="all">Semua Non-PIPP</option>
                <option value="711">Non-PIPP 711</option>
                <option value="712">Non-PIPP 712</option>
            </select>

            <canvas id="apiPieChart"></canvas>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="js/script.js"></script>



</body>
</body>
</html>
